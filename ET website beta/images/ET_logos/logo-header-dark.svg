<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" width="280" height="48" role="img">
  <title>Executive Translation</title>
  <desc>Executive Translation horizontal wordmark for footer and dark sections — cream text on transparent background</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&amp;display=swap');
    </style>
  </defs>

  <!-- E mark -->
  <text x="18" y="38"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="38"
    font-weight="400"
    font-style="italic"
    fill="#9a7b4f"
    text-anchor="middle">E</text>

  <!-- Hairline -->
  <line x1="36" y1="6" x2="36" y2="42" stroke="#f8f4ef" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Wordmark -->
  <text x="48" y="29"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="17"
    font-weight="500"
    letter-spacing="0.5"
    fill="#f8f4ef">Executive Translation</text>
</svg>
