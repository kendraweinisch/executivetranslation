<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100" role="img">
  <title>Executive Translation</title>
  <desc>Executive Translation logo — light version with italic serif E mark and mixed-case wordmark</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="320" height="100" rx="4" fill="#f8f4ef" stroke="#e0d8cc" stroke-width="0.5"/>

  <!-- E mark with subtle tinted field -->
  <rect x="16" y="10" width="62" height="80" rx="2" fill="#9a7b4f" fill-opacity="0.08"/>
  <text x="47" y="82"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="72"
    font-weight="400"
    font-style="italic"
    fill="#9a7b4f"
    text-anchor="middle">E</text>

  <!-- Hairline divider -->
  <line x1="92" y1="14" x2="92" y2="86" stroke="#e0d8cc" stroke-width="0.75"/>

  <!-- Wordmark -->
  <text x="108" y="44"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="18"
    font-weight="500"
    letter-spacing="0.5"
    fill="#141210">Executive Translation</text>

  <!-- Gold rule -->
  <line x1="108" y1="54" x2="304" y2="54" stroke="#9a7b4f" stroke-width="0.75"/>

  <!-- Tagline -->
  <text x="108" y="68"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="8"
    font-weight="500"
    letter-spacing="2"
    fill="#9a7b4f">THE METHOD™</text>
</svg>
